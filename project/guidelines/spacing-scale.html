<!-- @dsCard group="Spacing" viewport="700x130" name="Spacing Scale" subtitle="4 · 8 · 16 · 24 · 40 · 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--color-primary); border-radius: var(--radius-sm); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="width:4px;height:4px"></div><div class="lab">4</div></div>
    <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="lab">8</div></div>
    <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="lab">16</div></div>
    <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="lab">24</div></div>
    <div class="item"><div class="box" style="width:40px;height:40px"></div><div class="lab">40</div></div>
    <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="lab">64</div></div>
  </div>
</body>
</html>
