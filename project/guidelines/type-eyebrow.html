<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 24px; display: flex; gap: 28px; align-items: center; }
  .eyebrow { font-size: var(--fs-caption); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--color-accent); font-weight: var(--fw-body-medium); }
  .eyebrow.muted { color: var(--text-muted); }
  .note { margin-left: auto; font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>
  <span class="eyebrow">Wohnen mit Charakter</span>
  <span class="eyebrow muted">Referenzen</span>
  <span class="note">letter-spacing 0.18em · uppercase</span>
</body>
</html>
