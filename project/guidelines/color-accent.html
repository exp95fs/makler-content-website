<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Terrakotta" subtitle="CTA / links / highlights — the 10%" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 20px; }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border-hair); overflow: hidden; background: var(--surface-card); }
  .chip { height: 76px; }
  .meta { padding: 9px 12px 12px; }
  .role { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 13px; color: var(--text-strong); margin-top: 3px; }
  .name { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-accent)"></div><div class="meta"><div class="role">Akzent</div><div class="hex">#BC6B49</div><div class="name">Gedämpftes Terrakotta</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-accent-deep)"></div><div class="meta"><div class="role">Akzent · Hover</div><div class="hex">#A4583A</div><div class="name">Pressed / Hover</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-accent-tint)"></div><div class="meta"><div class="role">Akzent · Tint</div><div class="hex">#F0E2D9</div><div class="name">Terracotta wash</div></div></div>
  </div>
</body>
</html>
