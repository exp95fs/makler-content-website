<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radius" subtitle="sm 8 · md 13 · lg 18 · xl 24 · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 24px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .box { width: 72px; height: 64px; background: var(--surface-card); border: 1px solid var(--border-hair); box-shadow: var(--shadow-sm); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .pill { width: 96px; border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm · 8</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md · 13</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · 18</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab">xl · 24</div></div>
    <div class="item"><div class="box pill"></div><div class="lab">pill · 100</div></div>
  </div>
</body>
</html>
