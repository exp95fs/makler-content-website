<!-- @dsCard group="Colors" viewport="700x120" name="60 · 30 · 10 Ratio" subtitle="Leinen ground · Salbei · Terrakotta" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 20px; }
  .bar { display: flex; height: 64px; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-hair); }
  .seg { display: flex; align-items: flex-end; padding: 9px 12px; font-size: 12px; font-weight: 600; }
  .s60 { flex: 60; background: var(--color-background); color: var(--text-muted); }
  .s30 { flex: 30; background: var(--color-primary); color: var(--color-on-primary); }
  .s10 { flex: 10; background: var(--color-accent); color: var(--color-on-accent); }
</style>
</head>
<body>
  <div class="bar">
    <div class="seg s60">60% Leinen</div>
    <div class="seg s30">30% Salbei</div>
    <div class="seg s10">10%</div>
  </div>
</body>
</html>
