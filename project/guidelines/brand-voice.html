<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 22px 24px; color: var(--text-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col h4 { margin: 0 0 8px; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; }
  .do h4 { color: var(--status-success); }
  .dont h4 { color: var(--status-danger); }
  .col p { margin: 0 0 6px; font-size: 13.5px; line-height: 1.5; }
  .do p { color: var(--text-body); }
  .dont p { color: var(--text-muted); }
  .quote { font-family: var(--font-heading); font-weight: 600; font-size: 18px; line-height: 1.25; color: var(--text-strong); letter-spacing: var(--ls-heading); margin: 0 0 14px; }
</style>
</head>
<body>
  <p class="quote">„Eine Immobilie ist mehr als Quadratmeter."</p>
  <div class="grid">
    <div class="col do"><h4>Do</h4><p>Lead with feeling — light, material, arrival.</p><p>Formal-warm „Sie". Concrete promises.</p></div>
    <div class="col dont"><h4>Don't</h4><p>Metrics, ROI, square-metre talk, shouting.</p><p>Emoji, English, exclamation stacks.</p></div>
  </div>
</body>
</html>
