<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Warm, low-contrast shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 28px 24px; }
  .row { display: flex; gap: 26px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 116px; height: 74px; background: var(--surface-card); border-radius: var(--radius-lg); border: 1px solid var(--border-hair); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
  </div>
</body>
</html>
