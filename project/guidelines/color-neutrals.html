<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Leinen / Taupe / Surface" subtitle="Grounds, cards, hairlines" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--border-hair); overflow: hidden; background: var(--surface-card); }
  .chip { height: 70px; }
  .meta { padding: 8px 10px 11px; }
  .role { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-strong); margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-background)"></div><div class="meta"><div class="role">Background</div><div class="hex">#F3EEE5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface)"></div><div class="meta"><div class="role">Surface</div><div class="hex">#FBF8F1</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-secondary)"></div><div class="meta"><div class="role">Taupe</div><div class="hex">#C7BCA9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-surface-sunk)"></div><div class="meta"><div class="role">Sunk</div><div class="hex">#EFE9DD</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-border)"></div><div class="meta"><div class="role">Border</div><div class="hex">#E0D8CA</div></div></div>
  </div>
</body>
</html>
