<!-- @dsCard group="Type" viewport="700x180" name="Display — Fraunces" subtitle="Soft old-style serif · headlines only" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 26px 24px; color: var(--text-strong); }
  .eyebrow { font-size: var(--fs-caption); letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--color-accent); font-weight: var(--fw-body-medium); margin-bottom: 14px; }
  .display { font-family: var(--font-heading); font-weight: var(--fw-heading); font-size: 46px; line-height: var(--lh-tight); letter-spacing: var(--ls-heading); }
  .note { font-size: 12px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="eyebrow">Wohnen mit Charakter</div>
  <div class="display">Wo Menschen ankommen.</div>
  <div class="note">Fraunces · 600 · 56/40/30 px · line-height 1.08 · tracking −0.01em</div>
</body>
</html>
