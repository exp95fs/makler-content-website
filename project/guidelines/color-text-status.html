<!-- @dsCard group="Colors" viewport="700x150" name="Text & Status" subtitle="Ink, muted, and earthy status hues" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-page); font-family: var(--font-body); padding: 20px; color: var(--text-body); }
  .wrap { display: flex; gap: 22px; align-items: stretch; }
  .text-demo { flex: 1.1; background: var(--surface-card); border: 1px solid var(--border-hair); border-radius: var(--radius-md); padding: 14px 16px; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
  .strong { color: var(--text-strong); font-size: 17px; font-weight: 600; }
  .muted { color: var(--text-muted); font-size: 14px; }
  .status { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .pill { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text-strong); }
  .dot { width: 13px; height: 13px; border-radius: 4px; flex: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="text-demo">
      <div class="strong">Erdschwarz · #2A2A22</div>
      <div class="muted">Muted · #5C5A4E — sublines & captions</div>
    </div>
    <div class="status">
      <span class="pill"><span class="dot" style="background:var(--status-success)"></span>Success #5C7048</span>
      <span class="pill"><span class="dot" style="background:var(--status-warning)"></span>Warning #C08A3E</span>
      <span class="pill"><span class="dot" style="background:var(--status-danger)"></span>Danger #A4583A</span>
      <span class="pill"><span class="dot" style="background:var(--status-info)"></span>Info #566D72</span>
    </div>
  </div>
</body>
</html>
